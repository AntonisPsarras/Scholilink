<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScholiLink - Γονική Συναίνεση</title>
    <link href="https://fonts.googleapis.com/css2?family=Fustat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fustat', sans-serif;
            background-color: #eceef0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #1a1a1a;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #a28ef9;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #666;
            margin-bottom: 30px;
        }
        .btn {
            background-color: #a28ef9;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            display: none; /* Hidden until loaded and valid */
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(162, 142, 249, 0.3);
            filter: brightness(1.1);
        }
        .btn:active {
            transform: translateY(0);
        }
        .status {
            font-weight: 600;
            margin-top: 20px;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #a28ef9;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="card" id="mainCard">
        <div id="loadingUI">
            <div class="loader"></div>
            <p>Φόρτωση στοιχείων συναίνεσης...</p>
        </div>
        
        <div id="contentUI" style="display:none;">
            <div class="icon">🛡️</div>
            <h1>Γονική Συναίνεση</h1>
            <p id="description">
                Ο μαθητής <strong id="studentName"></strong> ζήτησε έγκριση για τη χρήση των λειτουργιών Τεχνητής Νοημοσύνης (AI) στο ScholiLink. 
                Οι λειτουργίες αυτές βοηθούν στην οργάνωση της μελέτης και την επεξήγηση ασκήσεων.
            </p>
            <button class="btn" id="approveBtn" onclick="handleApprove()">Έγκριση Tώρα</button>
            <p id="statusMsg" class="status"></p>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js";

        // Firebase Web Config
        const firebaseConfig = {
            apiKey: 'YOUR_FIREBASE_API_KEY',
            appId: '1:158790888866:web:0775f68b713e3072d656fb',
            messagingSenderId: '158790888866',
            projectId: 'student-dashboard-greece',
            authDomain: 'student-dashboard-greece.firebaseapp.com',
            storageBucket: 'student-dashboard-greece.firebasestorage.app',
        };

        const app = initializeApp(firebaseConfig);
        const functions = getFunctions(app, 'us-central1');
        const verifyParentalConsent = httpsCallable(functions, 'verifyParentalConsent');

        // State
        let uid = null;
        let token = null;

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            uid = urlParams.get('uid');
            token = urlParams.get('token');
            const nameParam = urlParams.get('name');

            if (!uid || !token) {
                showError("Λείπουν στοιχεία ταυτοποίησης. Παρακαλώ χρησιμοποιήστε τον σύνδεσμο από το email.");
                return;
            }

            // Set the student name from URL
            if (nameParam) {
                document.getElementById('studentName').innerText = decodeURIComponent(nameParam);
            } else {
                document.getElementById('studentName').innerText = "σας";
            }

            // Show UI immediately
            document.getElementById('loadingUI').style.display = 'none';
            document.getElementById('contentUI').style.display = 'block';
            document.getElementById('approveBtn').style.display = 'block';
        }

        window.handleApprove = async () => {
            const btn = document.getElementById('approveBtn');
            const status = document.getElementById('statusMsg');
            btn.disabled = true;
            btn.innerText = "Επεξεργασία...";

            try {
                await verifyParentalConsent({ uid: uid, token: token });
                showSuccess("Η έγκριση ολοκληρώθηκε! Ο μαθητής σας έχει πλέον πρόσβαση στις λειτουργίες AI του ScholiLink.");
            } catch (error) {
                console.error(error);
                status.innerText = "Σφάλμα κατά την έγκριση. Βεβαιωθείτε ότι ο σύνδεσμος είναι σωστός.";
                status.style.color = "#ff8a8a";
                btn.disabled = false;
                btn.innerText = "Έγκριση Tώρα";
            }
        };

        function showError(msg) {
            document.getElementById('loadingUI').style.display = 'none';
            document.getElementById('contentUI').style.display = 'block';
            const status = document.getElementById('statusMsg');
            status.innerText = msg;
            status.style.color = "#ff8a8a";
        }

        function showSuccess(msg) {
            document.getElementById('loadingUI').style.display = 'none';
            document.getElementById('contentUI').style.display = 'block';
            document.getElementById('approveBtn').style.display = 'none';
            const status = document.getElementById('statusMsg');
            status.innerText = msg;
            status.style.color = "#a4f5a6";
        }

        init();
    </script>
</body>
</html>
